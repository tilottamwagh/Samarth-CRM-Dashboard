server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the Django backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy static/media files served by Django
    location /static/ {
        proxy_pass http://backend:8000/static/;
    }
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }

    # Serve legal pages as static HTML — readable by Meta's crawler (no JS needed)
    location = /privacy-policy {
        try_files /privacy-policy.html =404;
    }
    location = /terms {
        try_files /terms.html =404;
    }
    location = /data-deletion {
        try_files /data-deletion.html =404;
    }

    # Handle React routing — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
